services:
  ebs:
    build:
      context: .
      dockerfile: Dockerfile.ebs
    env_file:
      - .env.hetzner
    environment:
      DATA_DIR: /data
    volumes:
      - ebs_data:/data
    restart: unless-stopped
    expose:
      - "8080"

  # Bot is now built into EBS - configured via extension panel
  # No separate bot container needed

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.hetzner
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./deploy/hetzner/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ebs

volumes:
  ebs_data:
  caddy_data:
  caddy_config:
