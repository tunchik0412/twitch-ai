services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       twitchai
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL:         postgresql://postgres:${DB_PASSWORD}@db:5432/twitchai
      TWITCH_CLIENT_ID:     ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      SECRET_KEY:           ${SECRET_KEY}
      ENCRYPTION_KEY:       ${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
        VITE_API_URL: ""
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - caddy_certs:/etc/letsencrypt:ro   # mount if using certbot
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  caddy_certs:
