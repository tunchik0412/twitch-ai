# Fly.io configuration for Twitch Gemini Chat Bot
# This is a BACKGROUND WORKER - no HTTP service needed

app = 'twitch-ai'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[env]
  BOT_PREFIX = "!"
  COOLDOWN_SECONDS = "5"

# No [http_service] - this is a background worker that connects to Twitch IRC

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
