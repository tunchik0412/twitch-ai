# fly.toml app configuration file generated for twitch-gemini-ebs on 2026-03-24T22:49:36+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'twitch-gemini-ebs'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile.ebs"

[env]
  DATA_DIR = "/data"

[mounts]
  source = "ebs_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
