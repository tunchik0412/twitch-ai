# Fly.io configuration for Twitch Extension Backend Service (EBS)
# Deploy: fly launch -c fly.ebs.toml -> fly secrets set -> fly deploy -c fly.ebs.toml

app = "twitch-gemini-ebs"
primary_region = "ams"  # Amsterdam

[build]
  dockerfile = "Dockerfile.ebs"

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "ebs_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
