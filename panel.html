<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gemini Assistant</title>
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            margin: 0;
            background: #1f1f2e;
            color: #efeff1;
        }
        .chat-window {
            background: #0e0e10;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }
        .user-message {
            background: #2a2a2e;
            border-left: 3px solid #9147ff;
        }
        .bot-message {
            background: #1e1e22;
            border-left: 3px solid #00b0f0;
        }
        .message-user {
            font-weight: bold;
            margin-right: 8px;
        }
        .message-text {
            word-wrap: break-word;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #2a2a2e;
            color: white;
        }
        button {
            padding: 10px 20px;
            background: #9147ff;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #7d3fd9;
        }
        .command-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .cmd-btn {
            background: #2a2a2e;
            padding: 5px 12px;
            font-size: 12px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #9147ff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="command-buttons">
        <button class="cmd-btn" data-command="joke">😂 Joke</button>
        <button class="cmd-btn" data-command="fact">📊 Fact</button>
        <button class="cmd-btn" data-command="roast">🔥 Roast Me</button>
        <button class="cmd-btn" data-command="help">❓ Help</button>
    </div>
    
    <div class="chat-window" id="chatWindow">
        <div class="message bot-message">
            <span class="message-user">🤖 Gemini:</span>
            <span class="message-text">Hello! I'm your AI assistant. Ask me anything with !ask or use the buttons above!</span>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Ask me something..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn">Send</button>
    </div>
    
    <script src="panel.js"></script>
</body>
</html>
