<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Assistant</title>
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            background: #0e0e10;
            color: #efeff1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid #2f2f35;
            margin-bottom: 8px;
        }
        .header h1 {
            font-size: 14px;
            color: #bf94ff;
        }
        .header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }
        .header .status-dot.online {
            background: #00ff7f;
        }
        .command-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .cmd-btn {
            background: #1f1f23;
            border: 1px solid #3a3a3d;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            color: #efeff1;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cmd-btn:hover {
            background: #2f2f35;
            border-color: #9147ff;
        }
        .cmd-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .cmd-btn.hidden {
            display: none;
        }
        .chat-window {
            flex: 1;
            background: #18181b;
            border-radius: 8px;
            overflow-y: auto;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #2f2f35;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }
        .user-message {
            background: #26262c;
            border-left: 3px solid #9147ff;
        }
        .bot-message {
            background: #1a1a2e;
            border-left: 3px solid #00b0f0;
        }
        .error-message {
            background: #2a1a1a;
            border-left: 3px solid #ff4444;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .message-user {
            font-weight: bold;
            font-size: 12px;
        }
        .message-time {
            font-size: 10px;
            color: #adadb8;
        }
        .message-text {
            font-size: 13px;
            line-height: 1.4;
        }
        .input-area {
            display: flex;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #3a3a3d;
            border-radius: 6px;
            background: #1f1f23;
            color: #efeff1;
            font-size: 13px;
        }
        .input-area input:focus {
            outline: none;
            border-color: #9147ff;
        }
        .input-area input:disabled {
            opacity: 0.5;
        }
        .input-area button {
            padding: 10px 16px;
            background: #9147ff;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .input-area button:hover {
            background: #772ce8;
        }
        .input-area button:disabled {
            background: #3a3a3d;
            cursor: not-allowed;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .loading-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #9147ff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .cooldown-notice {
            font-size: 11px;
            color: #adadb8;
            text-align: center;
            padding: 4px;
        }
        .welcome-message {
            text-align: center;
            padding: 20px;
            color: #adadb8;
        }
        .welcome-message h2 {
            color: #bf94ff;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .welcome-message p {
            font-size: 12px;
            line-height: 1.5;
        }
        .not-configured {
            text-align: center;
            padding: 40px 20px;
            color: #adadb8;
        }
        .not-configured h2 {
            color: #ff4444;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Gemini Assistant</h1>
        <div class="status-dot" id="statusDot" title="Disconnected"></div>
    </div>
    
    <div class="command-buttons" id="commandButtons">
        <button class="cmd-btn" data-command="joke" id="btnJoke">😂 Joke</button>
        <button class="cmd-btn" data-command="fact" id="btnFact">📊 Fact</button>
        <button class="cmd-btn" data-command="roast" id="btnRoast">🔥 Roast Me</button>
    </div>
    
    <div class="chat-window" id="chatWindow">
        <div class="welcome-message">
            <h2>Welcome!</h2>
            <p>Ask me anything using the input below,<br>or use the quick command buttons above!</p>
        </div>
    </div>
    
    <div id="cooldownNotice" class="cooldown-notice" style="display: none;"></div>
    
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Ask me anything..." maxlength="200">
        <button id="sendBtn">Ask</button>
    </div>
    
    <script src="panel.js"></script>
</body>
</html>
