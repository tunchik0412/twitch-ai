<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Configure Gemini Bot</title>
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            background: #f5f5f5;
        }
        .config-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .config-section h2 {
            margin-top: 0;
            color: #6441a5;
        }
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .checkbox-group input {
            width: auto;
        }
        button {
            background-color: #6441a5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            width: 100%;
        }
        button:hover {
            background-color: #7d5bbe;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }
        .cooldown-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .cooldown-group input {
            width: 80px;
        }
    </style>
</head>
<body>
    <div class="config-section">
        <h2>🤖 Gemini AI Configuration</h2>
        <p><strong>This configuration page is only visible to you, the streamer.</strong></p>
        
        <label>Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="Enter your Gemini API key">
        <small style="color: #666;">Get your API key from <a href="https://makersuite.google.com/app/apikey" target="_blank">Google AI Studio</a></small>
        
        <label>AI Model:</label>
        <select id="model">
            <option value="gemini-pro">Gemini Pro</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
            <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        </select>
        
        <label>Temperature (Creativity):</label>
        <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7">
        <span id="tempValue">0.7</span>
        
        <label>Max Response Length:</label>
        <input type="number" id="maxLength" value="300" min="50" max="450">
    </div>
    
    <div class="config-section">
        <h2>🎮 Command Settings</h2>
        
        <div class="checkbox-group">
            <input type="checkbox" id="enableAsk" checked>
            <label style="margin:0">Enable !ask command</label>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="enableRoast" checked>
            <label style="margin:0">Enable !roast command</label>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="enableJoke" checked>
            <label style="margin:0">Enable !joke command</label>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="enableFact" checked>
            <label style="margin:0">Enable !fact command</label>
        </div>
        
        <label>Command Cooldown (seconds):</label>
        <input type="number" id="cooldown" value="5" min="1" max="30">
    </div>
    
    <div class="config-section">
        <h2>🎨 Appearance</h2>
        
        <label>Bot Name Prefix:</label>
        <input type="text" id="botPrefix" value="🤖 Gemini">
        
        <label>Response Style:</label>
        <select id="responseStyle">
            <option value="friendly">Friendly & Casual</option>
            <option value="professional">Professional</option>
            <option value="funny">Funny & Entertaining</option>
            <option value="lore">Lore-Friendly (RPG style)</option>
        </select>
        
        <label>Custom System Prompt (optional):</label>
        <textarea id="customPrompt" rows="3" placeholder="You are a friendly AI assistant in a Twitch stream..."></textarea>
    </div>
    
    <button id="saveBtn">💾 Save Configuration</button>
    <div id="status" class="status"></div>
    
    <script src="config.js"></script>
</body>
</html>
